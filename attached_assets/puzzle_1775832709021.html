<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📦 The Memory Vault · Co-op Scrapbook (More Questions)</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
    }
    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(145deg, #2b2d42 0%, #1d1f2c 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .game-container {
      max-width: 650px;
      width: 100%;
      background: rgba(22, 23, 35, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 48px;
      padding: 28px 24px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,215,150,0.2);
      border: 1px solid rgba(255, 245, 200, 0.15);
      transition: all 0.2s;
    }
    h1 {
      margin: 0 0 8px 0;
      font-weight: 500;
      font-size: 2.5rem;
      letter-spacing: 2px;
      color: #f8e3b0;
      text-shadow: 0 4px 10px #00000040;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 span {
      background: #4e3b2b;
      padding: 4px 14px;
      border-radius: 60px;
      font-size: 1rem;
      color: #ffdead;
      border: 1px solid #b99e6b;
    }
    .turn-indicator {
      background: #2f2a24;
      border-radius: 40px;
      padding: 14px 22px;
      margin: 15px 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-left: 6px solid #e6b87e;
      box-shadow: inset 0 2px 5px #0b0b0e, 0 6px 8px #00000033;
    }
    .player-badge {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 30px;
      background: #5f4c3b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1.8rem;
      box-shadow: 0 4px 0 #1e1a14;
      border: 1px solid #cfb586;
    }
    .turn-text {
      font-size: 1.3rem;
      font-weight: 600;
      color: #f3deba;
    }
    .puzzle-section {
      background: #1e1b16;
      border-radius: 32px;
      padding: 20px;
      box-shadow: inset 0 0 0 1px #6b5a44, 0 10px 20px #00000055;
    }
    .puzzle-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      aspect-ratio: 1 / 1;
      max-width: 350px;
      margin: 0 auto 15px;
    }
    .tile {
      background: #d9c49c;
      background-image: radial-gradient(circle at 30% 30%, #fff2d7, #c8af87);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      font-weight: bold;
      color: #2f261a;
      box-shadow: 0 6px 0 #6b4f2e, 0 8px 12px black;
      cursor: pointer;
      user-select: none;
      transition: all 0.08s;
      border: 2px solid #ebd5a8;
      text-shadow: 1px 2px 2px rgba(255,255,200,0.8);
    }
    .tile.empty {
      background: #2f2a22;
      box-shadow: inset 0 0 0 2px #5e4d35, 0 4px 8px black;
      border: 2px dashed #aa8c64;
      color: transparent;
      background-image: none;
      cursor: default;
    }
    .tile:not(.empty):hover {
      transform: scale(0.97);
      background: #ecdbb8;
      box-shadow: 0 3px 0 #5a4029, 0 6px 10px black;
    }
    .puzzle-controls {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      background: #4a3f30;
      border: none;
      border-bottom: 4px solid #1f1a13;
      color: #f3e3c2;
      padding: 12px 22px;
      font-size: 1.1rem;
      font-weight: bold;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.1s;
      box-shadow: 0 5px 0 #1e1812;
      letter-spacing: 0.5px;
      border: 1px solid #9e8b6f;
    }
    .btn:hover {
      background: #5f5340;
      transform: translateY(-2px);
      box-shadow: 0 7px 0 #1e1812;
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #1e1812;
    }
    .vault-panel {
      margin-top: 28px;
      background: #1f1c16e0;
      border-radius: 28px;
      padding: 18px 22px;
      backdrop-filter: blur(4px);
      border: 1px solid #b1976b;
      box-shadow: inset 0 0 15px #00000055, 0 8px 0 #0e0c09;
    }
    .locked-message {
      color: #bbaa8a;
      font-style: italic;
      padding: 8px 0;
    }
    .memory-content {
      color: #f0e0c0;
    }
    .memory-message {
      font-size: 1.5rem;
      font-weight: 500;
      margin: 5px 0 10px;
      line-height: 1.3;
      border-left: 4px solid #eebb77;
      padding-left: 18px;
    }
    .question-box {
      background: #2b241c;
      border-radius: 24px;
      padding: 16px;
      margin: 18px 0 8px;
    }
    .question {
      font-size: 1.25rem;
      color: #fadfae;
      margin-bottom: 12px;
    }
    .answer-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .answer-input {
      flex: 2;
      min-width: 180px;
      background: #12100c;
      border: 2px solid #ab8e62;
      border-radius: 40px;
      padding: 12px 18px;
      font-size: 1rem;
      color: #f2e1c0;
      outline: none;
    }
    .answer-input::placeholder {
      color: #7f6e58;
    }
    .submit-answer {
      background: #7a5d3c;
      border-bottom: 4px solid #3e2f1f;
      padding: 12px 24px;
    }
    .answer-feedback {
      margin-top: 12px;
      color: #b9a887;
      font-style: italic;
    }
    .next-memory-hint {
      text-align: right;
      color: #d4bc91;
      margin-top: 5px;
    }
    .footer {
      margin-top: 20px;
      color: #7a6e5c;
      text-align: center;
      font-size: 0.8rem;
    }
    .small-note {
      font-size: 0.8rem;
      color: #b0986e;
      margin-left: 10px;
    }
  </style>
</head>
<body>
<div class="game-container">
  <h1>📦 THE MEMORY VAULT <span>2P co‑op</span></h1>
  
  <div class="turn-indicator" id="turnIndicator">
    <div class="player-badge">
      <div class="avatar" id="playerAvatar">🧩</div>
      <div class="turn-text" id="turnText">Player 1 · Solve puzzle</div>
    </div>
    <div style="font-size:1.8rem;">🔓</div>
  </div>

  <div class="puzzle-section">
    <div class="puzzle-grid" id="puzzleGrid"></div>
    <div class="puzzle-controls">
      <button class="btn" id="shuffleBtn">🔄 Shuffle</button>
      <button class="btn" id="checkWinBtn">✅ Check solution</button>
    </div>
  </div>

  <div class="vault-panel" id="vaultPanel">
    <div id="lockedDisplay" class="locked-memory">
      <div class="locked-message">🔒 Memory locked — solve the puzzle to reveal</div>
    </div>
    <div id="memoryDisplay" style="display: none;">
      <div class="memory-content">
        <div style="display: flex; gap: 10px; align-items: center;">
          <span style="font-size:2.2rem;">🖼️</span> 
          <span style="color:#c5aa7a;">Memory #<span id="memoryIndexDisplay">1</span> / <span id="totalMemories">6</span></span>
        </div>
        <div class="memory-message" id="memoryMessage">Loading...</div>
        <div class="question-box">
          <div class="question" id="questionText">❓ Question appears here</div>
          <div class="answer-area">
            <input type="text" id="answerInput" class="answer-input" placeholder="Your answer..." disabled>
            <button class="btn submit-answer" id="submitAnswerBtn" disabled>💬 Answer</button>
          </div>
          <div id="answerFeedback" class="answer-feedback"></div>
        </div>
        <div style="margin-top: 8px;">
          <button class="btn" id="newQuestionBtn" style="padding: 6px 16px; font-size: 0.9rem;" disabled>🎲 New question</button>
          <span class="small-note">(only before answering)</span>
        </div>
      </div>
    </div>
    <div id="nextMemoryPrompt" class="next-memory-hint"></div>
  </div>
  <div class="footer">✨ take turns · unlock together · 15+ questions ✨</div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- EXPANDED MEMORY VAULT (6 memories) ----------
    const memories = [
      { message: "🏖️ Beach day at Crescent Bay", photoHint: "🌊☀️" },
      { message: "🎂 Surprise 30th birthday party", photoHint: "🎉🎈" },
      { message: "🏕️ Camping under the stars", photoHint: "⛺✨" },
      { message: "🍝 First homemade pasta night", photoHint: "🍝👩‍🍳" },
      { message: "🚗 Road trip to the mountains", photoHint: "🏔️🚙" },
      { message: "🎓 Graduation celebration", photoHint: "🎓🥂" }
    ];

    // ---------- QUESTION BANK (15+ random questions) ----------
    const questionBank = [
      "What was the funniest moment that day?",
      "Who said something unforgettable?",
      "What song was playing in the background?",
      "What did we eat that was surprisingly good?",
      "What's one detail you remember that I might have forgotten?",
      "If this memory were a movie scene, what would the title be?",
      "What made you laugh until you cried?",
      "What was the weather like, and did it affect the day?",
      "Who took the photo? (If any)",
      "What's a hidden story behind this memory?",
      "What do you wish we could relive from that moment?",
      "What's something you learned about me that day?",
      "Describe this memory in three words.",
      "If you could send a postcard from that moment, what would it say?",
      "What was the most unexpected thing that happened?",
      "What's a scent or sound you associate with this memory?",
      "How did you feel at the end of that day?"
    ];

    // Game state
    let currentMemoryIndex = 0;
    let gamePhase = 'puzzle';                 // 'puzzle' or 'answer'
    let puzzleSolvedForCurrentMemory = false;
    let answerSubmitted = false;
    let currentQuestion = "";                 // stores the selected question for this memory
    
    // Puzzle state (3x3)
    const SIZE = 3;
    let tiles = [];
    let emptyPos = { row: 2, col: 2 };
    
    // DOM elements
    const puzzleGridEl = document.getElementById('puzzleGrid');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const checkWinBtn = document.getElementById('checkWinBtn');
    const turnText = document.getElementById('turnText');
    const playerAvatar = document.getElementById('playerAvatar');
    const lockedDisplay = document.getElementById('lockedDisplay');
    const memoryDisplay = document.getElementById('memoryDisplay');
    const memoryMessageEl = document.getElementById('memoryMessage');
    const questionTextEl = document.getElementById('questionText');
    const answerInput = document.getElementById('answerInput');
    const submitAnswerBtn = document.getElementById('submitAnswerBtn');
    const answerFeedback = document.getElementById('answerFeedback');
    const nextMemoryPrompt = document.getElementById('nextMemoryPrompt');
    const memoryIndexSpan = document.getElementById('memoryIndexDisplay');
    const totalMemoriesSpan = document.getElementById('totalMemories');
    const newQuestionBtn = document.getElementById('newQuestionBtn');

    // Set total memories display
    totalMemoriesSpan.innerText = memories.length;

    // ---------- Helper: pick a random question from bank ----------
    function getRandomQuestion() {
      return questionBank[Math.floor(Math.random() * questionBank.length)];
    }

    // Assign random question to current memory (but only if not answered yet)
    function assignRandomQuestion() {
      currentQuestion = getRandomQuestion();
      questionTextEl.innerText = `❓ ${currentQuestion}`;
    }

    // ---------- Update UI for turn / phase ----------
    function updateTurnUI() {
      if (gamePhase === 'puzzle') {
        turnText.innerText = 'Player 1 · Unlock the memory';
        playerAvatar.innerText = '🧩';
      } else {
        turnText.innerText = 'Player 2 · Answer the question';
        playerAvatar.innerText = '💬';
      }
      
      const memoryUnlocked = puzzleSolvedForCurrentMemory && gamePhase === 'answer';
      answerInput.disabled = !memoryUnlocked;
      submitAnswerBtn.disabled = !memoryUnlocked;
      newQuestionBtn.disabled = !memoryUnlocked || answerSubmitted; // only before answering
      
      if (!memoryUnlocked) {
        answerInput.value = '';
        answerFeedback.innerText = '';
      }
      
      if (puzzleSolvedForCurrentMemory) {
        lockedDisplay.style.display = 'none';
        memoryDisplay.style.display = 'block';
        const mem = memories[currentMemoryIndex];
        memoryMessageEl.innerText = `${mem.photoHint}  ${mem.message}`;
        memoryIndexSpan.innerText = currentMemoryIndex + 1;
        // If question not set yet (first unlock), assign random
        if (!currentQuestion) {
          assignRandomQuestion();
        } else {
          questionTextEl.innerText = `❓ ${currentQuestion}`;
        }
      } else {
        lockedDisplay.style.display = 'block';
        memoryDisplay.style.display = 'none';
      }
      
      if (answerSubmitted) {
        if (currentMemoryIndex < memories.length - 1) {
          nextMemoryPrompt.innerText = '✅ Answer saved! Ready for next memory — Player 1, press Shuffle.';
        } else {
          nextMemoryPrompt.innerText = '🎉 Vault complete! You’ve unlocked all memories.';
        }
      } else {
        nextMemoryPrompt.innerText = '';
      }
    }

    // ---------- PUZZLE LOGIC ----------
    function initSolvedTiles() {
      let val = 1;
      tiles = Array(SIZE).fill().map(() => Array(SIZE).fill(0));
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (r === SIZE-1 && c === SIZE-1) {
            tiles[r][c] = 0;
            emptyPos = { row: r, col: c };
          } else {
            tiles[r][c] = val++;
          }
        }
      }
    }

    function shufflePuzzle(steps = 40) {
      const directions = [
        { dr: -1, dc: 0 }, { dr: 1, dc: 0 },
        { dr: 0, dc: -1 }, { dr: 0, dc: 1 }
      ];
      for (let s = 0; s < steps; s++) {
        const validMoves = directions.filter(d => {
          const nr = emptyPos.row + d.dr;
          const nc = emptyPos.col + d.dc;
          return nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE;
        });
        if (validMoves.length === 0) continue;
        const move = validMoves[Math.floor(Math.random() * validMoves.length)];
        const swapRow = emptyPos.row + move.dr;
        const swapCol = emptyPos.col + move.dc;
        tiles[emptyPos.row][emptyPos.col] = tiles[swapRow][swapCol];
        tiles[swapRow][swapCol] = 0;
        emptyPos = { row: swapRow, col: swapCol };
      }
      renderPuzzle();
    }

    function checkWin() {
      let val = 1;
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (r === SIZE-1 && c === SIZE-1) {
            if (tiles[r][c] !== 0) return false;
          } else {
            if (tiles[r][c] !== val++) return false;
          }
        }
      }
      return true;
    }

    function handlePuzzleWin() {
      if (!puzzleSolvedForCurrentMemory) {
        puzzleSolvedForCurrentMemory = true;
        gamePhase = 'answer';
        // Assign a fresh random question when memory unlocks
        assignRandomQuestion();
        updateTurnUI();
      }
    }

    function attemptMove(row, col) {
      if (gamePhase !== 'puzzle') return;
      if (puzzleSolvedForCurrentMemory) return;
      const dr = Math.abs(emptyPos.row - row);
      const dc = Math.abs(emptyPos.col - col);
      if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) {
        tiles[emptyPos.row][emptyPos.col] = tiles[row][col];
        tiles[row][col] = 0;
        emptyPos = { row, col };
        renderPuzzle();
        if (checkWin()) {
          handlePuzzleWin();
        }
      }
    }

    function renderPuzzle() {
      puzzleGridEl.innerHTML = '';
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const value = tiles[r][c];
          const tileDiv = document.createElement('div');
          tileDiv.className = 'tile' + (value === 0 ? ' empty' : '');
          tileDiv.textContent = value === 0 ? '' : value;
          tileDiv.addEventListener('click', () => attemptMove(r, c));
          puzzleGridEl.appendChild(tileDiv);
        }
      }
    }

    function resetPuzzleToSolved() {
      initSolvedTiles();
      renderPuzzle();
    }

    // ---------- ANSWER SUBMISSION ----------
    function submitAnswerHandler() {
      if (gamePhase !== 'answer' || !puzzleSolvedForCurrentMemory) return;
      const answer = answerInput.value.trim();
      if (answer === '') {
        answerFeedback.innerText = '✏️ Write something to remember...';
        return;
      }
      answerSubmitted = true;
      answerFeedback.innerText = `📝 Saved: "${answer}" — thank you!`;
      submitAnswerBtn.disabled = true;
      answerInput.disabled = true;
      newQuestionBtn.disabled = true;
      
      if (currentMemoryIndex < memories.length - 1) {
        nextMemoryPrompt.innerText = '✅ Answer saved! Press SHUFFLE to start next memory.';
      } else {
        nextMemoryPrompt.innerText = '🎉 All memories unlocked! You’ve completed the vault.';
      }
      updateTurnUI();
    }

    // ---------- NEW QUESTION (only before answer) ----------
    function refreshQuestion() {
      if (gamePhase === 'answer' && puzzleSolvedForCurrentMemory && !answerSubmitted) {
        assignRandomQuestion();
        answerFeedback.innerText = '🔄 New question — your choice!';
      }
    }

    // ---------- ADVANCE TO NEXT MEMORY (on shuffle when answered) ----------
    function advanceToNextMemoryIfReady() {
      if (answerSubmitted && currentMemoryIndex < memories.length - 1) {
        currentMemoryIndex++;
        puzzleSolvedForCurrentMemory = false;
        answerSubmitted = false;
        gamePhase = 'puzzle';
        currentQuestion = "";  // will be assigned on next unlock
        resetPuzzleToSolved();
        shufflePuzzle(30);
        updateTurnUI();
        nextMemoryPrompt.innerText = '';
        answerFeedback.innerText = '';
        answerInput.value = '';
      } else if (answerSubmitted && currentMemoryIndex === memories.length - 1) {
        // all done, reshuffle for fun if in puzzle phase
        if (gamePhase === 'puzzle') shufflePuzzle(30);
      } else {
        if (gamePhase === 'puzzle' && !puzzleSolvedForCurrentMemory) {
          shufflePuzzle(30);
        } else if (puzzleSolvedForCurrentMemory) {
          alert("Finish answering first! (Player 2's turn)");
        }
      }
    }

    function manualCheckWin() {
      if (gamePhase === 'puzzle' && !puzzleSolvedForCurrentMemory) {
        if (checkWin()) {
          handlePuzzleWin();
        } else {
          alert("🧩 Not quite solved yet. Keep going!");
        }
      } else if (puzzleSolvedForCurrentMemory) {
        alert("Memory already unlocked! Player 2, answer the question.");
      }
    }

    // ---------- INITIALIZE ----------
    function initGame() {
      initSolvedTiles();
      shufflePuzzle(35);
      currentMemoryIndex = 0;
      puzzleSolvedForCurrentMemory = false;
      answerSubmitted = false;
      gamePhase = 'puzzle';
      currentQuestion = "";
      
      const firstMem = memories[0];
      memoryMessageEl.innerText = `${firstMem.photoHint}  ${firstMem.message}`;
      memoryIndexSpan.innerText = '1';
      
      updateTurnUI();
      answerInput.value = '';
    }

    // Event listeners
    shuffleBtn.addEventListener('click', advanceToNextMemoryIfReady);
    checkWinBtn.addEventListener('click', manualCheckWin);
    submitAnswerBtn.addEventListener('click', submitAnswerHandler);
    newQuestionBtn.addEventListener('click', refreshQuestion);
    
    answerInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        submitAnswerHandler();
      }
    });

    // Start game
    initGame();
  })();
</script>
</body>
</html>
