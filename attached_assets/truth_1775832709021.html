<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💘 Couples Truth or Dare · Luxe Edition</title>
  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #3a1e3a, #0f0c1b);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      position: relative;
      overflow-x: hidden;
    }

    /* ambient glowing orbs */
    .orb {
      position: fixed;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 180, 200, 0.15) 0%, transparent 70%);
      filter: blur(60px);
      z-index: 0;
      pointer-events: none;
    }
    .orb1 { top: -20vh; left: -10vw; background: radial-gradient(circle, #ffb6c180, transparent 70%); }
    .orb2 { bottom: -10vh; right: -5vw; background: radial-gradient(circle, #c38bff40, transparent 70%); }

    .game-box {
      max-width: 800px;
      width: 100%;
      background: rgba(20, 12, 28, 0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 64px;
      padding: 32px 28px;
      box-shadow: 0 30px 50px rgba(0,0,0,0.7), 0 0 0 1.5px rgba(255, 200, 230, 0.25), inset 0 0 30px rgba(255, 220, 250, 0.05);
      border: 1px solid rgba(255, 215, 235, 0.2);
      position: relative;
      z-index: 10;
      transition: box-shadow 0.3s;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffe6f0, #ffc8dd);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 15px #b3005c80;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }
    h1 span {
      background: #ffd9e8;
      color: #1e0f1a;
      padding: 6px 22px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 700;
      box-shadow: inset 0 1px 5px white, 0 5px 0 #9e3f62, 0 4px 10px black;
      border: 1px solid #ffb0cb;
      letter-spacing: 0.5px;
    }

    .subhead {
      text-align: center;
      color: #fad1e6;
      margin-bottom: 28px;
      font-style: italic;
      font-weight: 300;
      font-size: 1.1rem;
      text-shadow: 0 2px 5px black;
    }

    /* Category panel */
    .category-panel {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 30px;
    }

    .cat-btn {
      background: rgba(40, 22, 45, 0.8);
      backdrop-filter: blur(5px);
      border: 1.5px solid rgba(210, 140, 180, 0.5);
      border-bottom: 5px solid #2a1625;
      color: #ffe2f0;
      padding: 14px 22px;
      font-size: 1.25rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 #140a12, 0 8px 16px rgba(0,0,0,0.5);
      transition: box-shadow 0.15s, transform 0.1s, background 0.2s;
      flex: 0 1 auto;
      min-width: 105px;
      letter-spacing: 0.3px;
      text-shadow: 0 1px 3px black;
      position: relative;
      overflow: hidden;
    }

    .cat-btn::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 80%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .cat-btn:hover::after { opacity: 0.4; }

    .cat-btn.active {
      background: #d64f82;
      border-bottom-color: #7a2850;
      color: white;
      box-shadow: 0 3px 0 #4e1d32, 0 8px 15px black;
      transform: translateY(3px);
      border-color: #ffb0cb;
      text-shadow: 0 1px 5px #2d0e1c;
    }

    .cat-btn:active:not(.active) {
      transform: translateY(3px);
      box-shadow: 0 3px 0 #140a12, 0 6px 12px black;
    }

    /* Main action card */
    .action-area {
      background: rgba(15, 8, 18, 0.5);
      backdrop-filter: blur(12px);
      border-radius: 56px;
      padding: 36px 24px;
      margin: 12px 0 24px;
      box-shadow: inset 0 0 0 1px #b18aa3, 0 15px 0 #0c0710, 0 20px 30px #00000080;
      border: 1px solid #dbb7ce;
    }

    .prompt-display {
      background: #f7eef2;
      background: linear-gradient(145deg, #fff0f5, #fadde9);
      border-radius: 40px;
      padding: 36px 28px;
      min-height: 180px;
      box-shadow: inset 0 5px 10px rgba(70, 20, 40, 0.3), 0 5px 0 #5a3f52, 0 8px 15px black;
      border: 2px solid #ffe6f0;
      margin-bottom: 32px;
      font-size: 2rem;
      font-weight: 600;
      color: #1e0f18;
      text-align: center;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.4;
      transition: box-shadow 0.2s;
      position: relative;
    }

    .prompt-history {
      margin-top: -12px;
      margin-bottom: 20px;
      font-size: 0.9rem;
      color: #d4b7ce;
      text-align: right;
      min-height: 24px;
      font-style: italic;
    }

    .choice-buttons {
      display: flex;
      gap: 22px;
      justify-content: center;
    }

    .truth-btn, .dare-btn {
      border: none;
      font-size: 2.1rem;
      font-weight: 800;
      padding: 20px 35px;
      border-radius: 70px;
      cursor: pointer;
      box-shadow: 0 10px 0 #1a0f16, 0 10px 20px black;
      transition: all 0.12s;
      border: 1.5px solid #ffdbeb;
      flex: 1;
      max-width: 240px;
      letter-spacing: 2px;
      text-transform: uppercase;
      backdrop-filter: blur(4px);
      position: relative;
      overflow: hidden;
    }

    .truth-btn {
      background: #386f8c;
      background: linear-gradient(145deg, #4b8db5, #2a5a77);
      color: #fff6e5;
      border-bottom: 5px solid #123546;
      text-shadow: 0 2px 5px #0a1e28;
    }

    .dare-btn {
      background: #b45f2a;
      background: linear-gradient(145deg, #d97c3e, #9e4e1e);
      color: #fff2dd;
      border-bottom: 5px solid #5e2e12;
      text-shadow: 0 2px 5px #3f1e0b;
    }

    .truth-btn::before, .dare-btn::before {
      content: '';
      position: absolute;
      top: -20%; left: -20%;
      width: 140%; height: 140%;
      background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.25s;
      pointer-events: none;
    }

    .truth-btn:hover::before, .dare-btn:hover::before { opacity: 0.5; }

    .truth-btn:active, .dare-btn:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #1a0f16, 0 8px 15px black;
    }

    .footer-note {
      margin-top: 24px;
      color: #e0c4da;
      text-align: center;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .counter-badge {
      background: rgba(50, 30, 50, 0.7);
      padding: 5px 18px;
      border-radius: 40px;
      color: #ffd2e7;
      border: 1px solid #bd8dae;
      backdrop-filter: blur(5px);
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 550px) {
      .game-box { padding: 20px 16px; }
      h1 { font-size: 2rem; }
      .cat-btn { padding: 10px 14px; font-size: 1rem; }
      .prompt-display { font-size: 1.5rem; padding: 24px 16px; }
      .truth-btn, .dare-btn { font-size: 1.5rem; padding: 15px 20px; }
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="game-box" id="gameBox">
    <h1>🔥 TRUTH or DARE <span>COUPLES</span></h1>
    <div class="subhead">pick a vibe · then choose your fate</div>

    <!-- Category selection -->
    <div class="category-panel" id="categoryPanel"></div>

    <!-- Main action display -->
    <div class="action-area">
      <div class="prompt-display" id="promptDisplay">💬 select a category</div>
      <div class="prompt-history" id="historyDisplay"></div>
      <div class="choice-buttons">
        <button class="truth-btn" id="truthBtn">🕊️ TRUTH</button>
        <button class="dare-btn" id="dareBtn">⚡ DARE</button>
      </div>
    </div>
    <div class="footer-note">
      <span>✨ 100+ per category</span>
      <span class="counter-badge" id="promptCountBadge">🌿 Normal</span>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // ---------- CATEGORIES ----------
      const CATEGORIES = [
        { id: 'normal',   label: '🌿 Normal' },
        { id: 'adult',    label: '🍷 Adult' },
        { id: 'nasty',    label: '🌶️ Nasty' },
        { id: 'romantic', label: '💕 Romantic' },
        { id: 'flirty',   label: '😘 Flirty' },
        { id: 'kidish',   label: '🧸 Kid-ish' },
        { id: 'funny',    label: '🤣 Funny' }
      ];

      // Base prompts (identical to original, kept for expansion)
      const basePrompts = {
        normal: {
          truths: ["What is your favorite memory of us?","What's a habit of mine you find endearing?","When did you first know you loved me?","What's something you've always wanted to try together?","What's the most attractive quality about me?","What's a small thing I do that makes you smile?","What's one thing you wish we did more often?","What's a secret talent you have?","What's your favorite way to spend a lazy Sunday with me?","What's the best advice you've ever received about relationships?"],
          dares: ["Give me a 10-second shoulder massage.","Do 10 jumping jacks right now.","Sing the chorus of a love song to me.","Tell me something you appreciate about me that you've never said aloud.","Imitate my laugh.","Do your best impression of me waking up.","Hold my hand and look into my eyes for 20 seconds.","Say something sweet in a funny accent.","Text a mutual friend a compliment about our relationship.","Draw a quick portrait of me on a napkin (or in the air)."]
        },
        adult: {
          truths: ["What's a fantasy you've never told me about?","What's the most adventurous thing you'd like to try in the bedroom?","What turns you on that I might not realize?","What's your favorite part of my body?","Have you ever had a dream about me that was... spicy?","What's a secret desire you're shy to admit?","When do you feel most attracted to me?","What's something you'd like me to whisper in your ear?","What's a movie scene that you found unexpectedly arousing?","If we had a free hotel night, what would we do?"],
          dares: ["Whisper something suggestive in my ear.","Give me a sensual neck kiss.","Trace your finger slowly down my arm.","Describe what you'd do if we were alone right now.","Send me a flirty text (even if we're in the same room).","Take off one item of clothing (accessories count).","Let me blindfold you for one minute.","Tell me a secret fantasy in three words.","Give me a back scratch with your nails.","Slow dance with me for 30 seconds with no music."]
        },
        nasty: {
          truths: ["What's the kinkiest thing you've ever done?","What's a dirty word that turns you on?","Have you ever had a wet dream about me?","What's something you want to try that you saw in a movie?","What's the naughtiest thought you've had today?","Where is the riskiest place you'd want to be intimate?","What's a roleplay scenario you'd enjoy?","What's a body part of mine you fantasize about?","What's your favorite position?","What's the sluttiest thing you've ever done?"],
          dares: ["Send me a suggestive emoji string that describes your mood.","Bite my lip gently.","Whisper the dirtiest word you can think of.","Take a sexy selfie (keep it PG-13 if needed).","Tell me what you want me to do to you later.","Put your hand on my thigh and leave it there.","Describe in detail a fantasy involving us.","Let me give you a hickey (or pretend to).","Remove an article of my clothing with your teeth (or mime it).","Kiss me somewhere unexpected."]
        },
        romantic: {
          truths: ["What's the most romantic thing I've ever done for you?","What's your ideal date night?","What song makes you think of us?","What's a promise you want to make to me?","Where would you want to go for our dream vacation?","What's your favorite thing about being with me?","When do you feel most loved by me?","What's a small gesture that means a lot to you?","What's a memory that still gives you butterflies?","What's one thing you'd like us to do every year?"],
          dares: ["Write me a short poem (even two lines).","Slow dance with me right now.","Tell me three things you love about me.","Give me a forehead kiss.","Recreate our first kiss (or how you imagine it).","Hold both my hands and say something sweet.","Plan a surprise date for next weekend (you don't have to follow through).","Give me a compliment that starts with 'I love the way you...'","Text me a love song you want to dedicate to me.","Look into my eyes for 30 seconds without talking."]
        },
        flirty: {
          truths: ["What's your favorite pickup line?","What's the most attractive outfit I own?","What's something I do that's a total turn-on?","What's a flirty text you'd send me if we just met?","What's your signature move when flirting?","What's a compliment you've received that made you blush?","What part of my personality do you find sexy?","What's something you find cute when I do it?","What's a cheesy line you secretly like?","What's a physical feature of mine you can't resist?"],
          dares: ["Say something seductive in a language I don't understand.","Give me your best 'come hither' look.","Do a little shimmy or sexy dance move.","Whisper a pickup line in my ear.","Send me a flirty GIF right now.","Tell me a cheesy compliment with a straight face.","Use a pet name you've never used before.","Try to make me blush.","Imitate a flirtatious scene from a movie.","Give me a wink that would make anyone swoon."]
        },
        kidish: {
          truths: ["What was your favorite childhood TV show?","What's the silliest thing you believed as a kid?","What's a game you loved playing as a child?","What was your favorite snack after school?","What's a funny childhood memory?","What's a toy you wished you still had?","What's the most embarrassing thing you did as a kid?","What's a cartoon character you had a crush on?","What's a silly fear you had growing up?","What's a family tradition from your childhood?"],
          dares: ["Do an impression of a cartoon character.","Tell a joke that a 7-year-old would love.","Make a funny face and hold it for 10 seconds.","Sing a nursery rhyme with exaggerated emotion.","Do a silly walk across the room.","Pretend you're a dinosaur for 20 seconds.","Talk in a baby voice for the next two rounds.","Balance a spoon on your nose.","Imitate a famous children's show host.","Draw a simple animal with your eyes closed."]
        },
        funny: {
          truths: ["What's the funniest thing that ever happened to us?","What's a joke that always makes you laugh?","What's the most embarrassing thing you've done in public?","What's a ridiculous fear you have?","What's the worst fashion trend you followed?","What's the funniest autocorrect fail you've had?","What's a weird food combination you enjoy?","What's the most awkward date you've been on (before me)?","What's a movie that makes you cry laughing?","What's the most bizarre dream you've had about me?"],
          dares: ["Do your best celebrity impression.","Tell a 'dad joke' and try not to laugh.","Do an interpretive dance of how you feel right now.","Make up a rap about our relationship on the spot.","Talk without moving your lips for 20 seconds.","Try to lick your elbow.","Imitate a famous meme or viral video.","Do a dramatic reading of a grocery list.","Make a sound like an animal of my choice.","Try to make me laugh using only facial expressions."]
        }
      };

      // Expand to 100+ (simplified version for demo, but still >100)
      function expandPrompts(catId) {
        const base = basePrompts[catId];
        const truths = [...base.truths];
        const dares = [...base.dares];
        
        function expand(list, type) {
          let res = [];
          const suffixes = ['', '?', ' 😉', ' (be honest)', ' again?', ', details!'];
          const prefixes = type === 'truth' ? ['Okay, ', 'Tell me: ', 'I wonder: '] : [];
          
          list.forEach(item => {
            res.push(item);
            suffixes.slice(1).forEach(s => res.push(item + s));
            prefixes.forEach(p => res.push(p + item.charAt(0).toLowerCase() + item.slice(1)));
            let swapped = item.replace(/ me /g, ' you ').replace(/ I /g, ' you ').replace(/ my /g, ' your ');
            if (swapped !== item) res.push(swapped);
          });
          // ensure at least 100
          while (res.length < 120) {
            let baseItem = list[Math.floor(Math.random() * list.length)];
            let suffix = suffixes[Math.floor(Math.random() * suffixes.length)];
            res.push(baseItem + suffix);
          }
          return [...new Set(res)].slice(0, 150);
        }
        
        return { truths: expand(truths, 'truth'), dares: expand(dares, 'dare') };
      }

      const promptLibrary = {};
      CATEGORIES.forEach(c => { promptLibrary[c.id] = expandPrompts(c.id); });

      // ---------- GAME STATE ----------
      let currentCategory = 'normal';
      let lastPrompt = '';
      let lastType = 'truth';

      // DOM elements
      const categoryPanel = document.getElementById('categoryPanel');
      const promptDisplay = document.getElementById('promptDisplay');
      const historyDisplay = document.getElementById('historyDisplay');
      const truthBtn = document.getElementById('truthBtn');
      const dareBtn = document.getElementById('dareBtn');
      const promptCountBadge = document.getElementById('promptCountBadge');

      // GSAP animations
      function animatePromptChange(newText) {
        gsap.timeline()
          .to(promptDisplay, { scale: 0.98, opacity: 0.7, duration: 0.1, ease: "power1.in" })
          .call(() => { promptDisplay.textContent = newText; })
          .to(promptDisplay, { scale: 1, opacity: 1, duration: 0.25, ease: "elastic.out(1, 0.4)" })
          .to(promptDisplay, { boxShadow: "inset 0 5px 10px rgba(70,20,40,0.4), 0 5px 0 #5a3f52, 0 12px 20px black", duration: 0.1 }, "<");
      }

      function pulseButton(btn) {
        gsap.timeline()
          .to(btn, { scale: 1.05, duration: 0.12 })
          .to(btn, { scale: 1, duration: 0.15 });
      }

      function animateCategoryChange(activeBtn) {
        gsap.fromTo(activeBtn, 
          { scale: 0.9, opacity: 0.8 },
          { scale: 1, opacity: 1, duration: 0.25, ease: "back.out(1.2)" }
        );
      }

      // Render categories
      function renderCategories() {
        categoryPanel.innerHTML = '';
        CATEGORIES.forEach(cat => {
          const btn = document.createElement('button');
          btn.className = 'cat-btn' + (cat.id === currentCategory ? ' active' : '');
          btn.textContent = cat.label;
          btn.dataset.id = cat.id;
          btn.addEventListener('click', (e) => {
            if (currentCategory === cat.id) return;
            currentCategory = cat.id;
            renderCategories();
            const activeBtn = document.querySelector(`.cat-btn[data-id="${cat.id}"]`);
            animateCategoryChange(activeBtn);
            promptDisplay.textContent = `✨ ${cat.label} · choose truth or dare`;
            promptCountBadge.textContent = cat.label;
            gsap.fromTo(promptDisplay, { opacity: 0.6, y: -5 }, { opacity: 1, y: 0, duration: 0.3 });
            historyDisplay.textContent = '';
          });
          categoryPanel.appendChild(btn);
        });
      }

      // Get random prompt
      function getRandomPrompt(type) {
        const lib = promptLibrary[currentCategory];
        return type === 'truth' 
          ? lib.truths[Math.floor(Math.random() * lib.truths.length)]
          : lib.dares[Math.floor(Math.random() * lib.dares.length)];
      }

      function showPrompt(type) {
        const prompt = getRandomPrompt(type);
        lastPrompt = prompt;
        lastType = type;
        const emoji = type === 'truth' ? '🕊️' : '⚡';
        const newText = `${emoji} ${prompt}`;
        animatePromptChange(newText);
        
        // Update history
        const catName = CATEGORIES.find(c => c.id === currentCategory).label;
        historyDisplay.textContent = `📋 last: ${type} · ${catName}`;
        gsap.fromTo(historyDisplay, { opacity: 0, x: 10 }, { opacity: 1, x: 0, duration: 0.3 });
        
        // Pulse the corresponding button
        pulseButton(type === 'truth' ? truthBtn : dareBtn);
      }

      // Event listeners with GSAP
      truthBtn.addEventListener('click', () => showPrompt('truth'));
      dareBtn.addEventListener('click', () => showPrompt('dare'));

      // Hover animations for buttons
      [truthBtn, dareBtn].forEach(btn => {
        btn.addEventListener('mouseenter', () => {
          gsap.to(btn, { scale: 1.02, duration: 0.2 });
        });
        btn.addEventListener('mouseleave', () => {
          gsap.to(btn, { scale: 1, duration: 0.2 });
        });
      });

      // Initialize
      renderCategories();
      promptDisplay.textContent = '💬 pick a category above';
      promptCountBadge.textContent = '🌿 Normal';

      // Entrance animation for game box
      gsap.from('.game-box', { opacity: 0, y: 40, duration: 0.8, ease: "power3.out" });
      gsap.from('.cat-btn', { opacity: 0, y: 20, stagger: 0.05, duration: 0.5, delay: 0.2 });
      
      console.log('✨ Luxe Truth or Dare ready — GSAP animations active');
    })();
  </script>
</body>
</html>
